<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Flame3D – FPS Level Editor</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --accent:   #1f6feb;
      --accentHi: #388bfd;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --danger:   #f85149;
      --success:  #3fb950;
      --topH:     46px;
      --sideW:    188px;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', monospace;
      font-size: 13px;
      overflow: hidden;
      user-select: none;
    }

    /* ── Top bar ──────────────────────────────────────────── */
    #topbar {
      height: var(--topH);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    #topbar::-webkit-scrollbar { height: 0; }

    .tb-title {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .05em;
      padding: 0 6px;
      white-space: nowrap;
    }
    .tb-sep {
      width: 1px; height: 24px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }
    .tb-group { display: flex; align-items: center; gap: 3px; }
    .tb-label {
      color: var(--muted);
      font-size: 11px;
      padding: 0 3px;
      white-space: nowrap;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 9px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      transition: background .1s, border-color .1s;
    }
    button:hover:not(:disabled) {
      background: var(--border);
      border-color: var(--accentHi);
    }
    button:disabled { opacity: .35; cursor: default; }
    button.active {
      background: #1c2d3e;
      border-color: var(--accent);
      color: var(--accentHi);
    }
    button.play-btn {
      background: #162014;
      border-color: var(--success);
      color: var(--success);
      font-weight: 600;
    }
    button.play-btn:hover { background: #1c2e1a; }
    button.stop-btn {
      background: #231414;
      border-color: var(--danger);
      color: var(--danger);
      font-weight: 600;
    }
    button.stop-btn:hover { background: #2e1a1a; }
    button.danger-btn { border-color: #5a3030; color: #c97c7c; }
    button.danger-btn:hover {
      background: #2e1a1a;
      border-color: var(--danger);
      color: var(--danger);
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 7px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    select:hover { border-color: var(--accentHi); }

    /* ── Workspace ────────────────────────────────────────── */
    #workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    #sidebar {
      width: var(--sideW);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .panel-hdr {
      padding: 7px 11px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .lib-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 9px;
    }
    .lib-btn {
      flex-direction: column;
      gap: 2px;
      padding: 9px 4px;
      font-size: 11px;
      justify-content: center;
    }
    .lib-btn .icon { font-size: 18px; }

    #props-panel { flex: 1; overflow-y: auto; border-top: 1px solid var(--border); }
    .prop-row {
      display: flex;
      align-items: flex-start;
      padding: 5px 11px;
      border-bottom: 1px solid #1a1f26;
      gap: 7px;
    }
    .prop-key {
      color: var(--muted);
      font-size: 10px;
      min-width: 38px;
      padding-top: 1px;
      letter-spacing: .04em;
    }
    .prop-val { color: var(--text); font-size: 11px; word-break: break-all; }

    /* ── Canvas container ─────────────────────────────────── */
    #canvas-container { flex: 1; position: relative; overflow: hidden; }
    #canvas-container canvas { display: block; }

    /* ── Crosshair ────────────────────────────────────────── */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      pointer-events: none;
      z-index: 20;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,.9);
      border-radius: 1px;
    }
    #crosshair::before { width: 2px; height: 14px; top: -7px; left: -1px; }
    #crosshair::after  { width: 14px; height: 2px; top: -1px; left: -7px; }

    /* ── Play hint ────────────────────────────────────────── */
    #play-hint {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      background: rgba(13,17,23,.88);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 20;
      backdrop-filter: blur(4px);
    }

    /* ── Status bar ───────────────────────────────────────── */
    #status-bar {
      position: absolute;
      bottom: 9px; right: 11px;
      background: rgba(13,17,23,.9);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 11px;
      color: var(--muted);
      pointer-events: none;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    .s-mode  { color: var(--accentHi); font-weight: 600; }
    .s-play  { color: var(--success);  font-weight: 600; }
    .s-sep   { opacity: .4; margin: 0 5px; }
    .s-hit   { color: #f0c060; }
  </style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────── -->
<div id="topbar">
  <span class="tb-title">🔥 Flame3D</span>
  <span class="tb-sep"></span>

  <div class="tb-group">
    <span class="tb-label">Mode</span>
    <button id="btn-place"  class="active" title="Place objects">⊕ Place</button>
    <button id="btn-select"               title="Select &amp; transform (W/E/R)">↗ Select</button>
    <button id="btn-delete"               title="Delete objects">✕ Delete</button>
  </div>

  <span class="tb-sep"></span>

  <div class="tb-group" id="transform-group" style="opacity:.4;pointer-events:none">
    <span class="tb-label">Gizmo</span>
    <button id="btn-translate" class="active" title="Move (W)">↔ Move</button>
    <button id="btn-rotate"                   title="Rotate (E)">↻ Rot</button>
    <button id="btn-scale"                    title="Scale (R)">⤡ Scale</button>
  </div>

  <span class="tb-sep"></span>

  <div class="tb-group">
    <span class="tb-label">Snap</span>
    <select id="snap-select">
      <option value="0">None</option>
      <option value="0.25">0.25</option>
      <option value="0.5">0.5</option>
      <option value="1" selected>1</option>
      <option value="2">2</option>
      <option value="4">4</option>
    </select>
  </div>

  <span class="tb-sep"></span>

  <div class="tb-group">
    <button id="btn-undo" disabled title="Undo (Ctrl+Z)">↩ Undo</button>
    <button id="btn-redo" disabled title="Redo (Ctrl+Y)">↪ Redo</button>
  </div>

  <span class="tb-sep"></span>

  <button id="btn-clear" class="danger-btn" title="Clear all objects">🗑 Clear</button>

  <span class="tb-sep"></span>

  <div class="tb-group">
    <button id="btn-save" title="Save level as JSON">💾 Save</button>
    <button id="btn-load" title="Load level from JSON">📂 Load</button>
    <input  id="load-input" type="file" accept=".json" style="display:none"/>
  </div>

  <span class="tb-sep"></span>

  <button id="btn-playtest" class="play-btn"              title="Start playtest (P)">▶ Play</button>
  <button id="btn-stop"     class="stop-btn" style="display:none" title="Stop playtest (Esc)">⏹ Stop</button>
</div>

<!-- ── Workspace ──────────────────────────────────────────── -->
<div id="workspace">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="panel-hdr">📚 Library</div>
    <div class="lib-grid">
      <button class="lib-btn active" data-type="wall">
        <span class="icon">🧱</span>Wall
      </button>
      <button class="lib-btn" data-type="floor">
        <span class="icon">⬜</span>Floor
      </button>
      <button class="lib-btn" data-type="target">
        <span class="icon">🎯</span>Target
      </button>
      <button class="lib-btn" data-type="light">
        <span class="icon">💡</span>Light
      </button>
    </div>

    <div id="props-panel" style="display:none">
      <div class="panel-hdr">⚙ Properties</div>
      <div id="props-content"></div>
    </div>
  </div>

  <!-- 3-D viewport -->
  <div id="canvas-container">
    <div id="crosshair"></div>
    <div id="play-hint">WASD · Move &nbsp;│&nbsp; Mouse · Look &nbsp;│&nbsp; LMB · Shoot &nbsp;│&nbsp; Esc · Exit</div>
    <div id="status-bar"><span id="status-text">Edit Mode</span></div>
  </div>

</div>

<script type="module" src="./main.js"></script>
</body>
</html>
